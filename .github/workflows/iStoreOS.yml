name: iStoreOS

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - iStoreOS

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: "ubuntu-24.04"

    env:
      DEBIAN_FRONTEND: noninteractive
      build_os: "ubuntu"
      build_success: ""

    steps:
    - if: github.event.repository.owner.id == github.event.sender.id
      name: 显示系统信息
      run: |
        echo -e "💬 Server information \n"
        echo -e "💻 Server running on Ubuntu: [ Release: $(cat /etc/os-release | grep VERSION_CODENAME | cut -d '=' -f2) / Host: $(arch) ] \n"
        echo -e "🧮 Server CPU configuration information: \n$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "💾 Server memory usage: \n$(free -h) \n"
        echo -e "🗃️ Server space usag: \n$(df -hT ${{ github.workspace }}) \n"

    - name: 准备可用空间
      uses: AdityaGarg8/remove-unwanted-software@v5
      with:
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true
        remove-large-packages: true
        remove-cached-tools: true
        remove-swapfile: true

    - name: 检出代码
      uses: actions/checkout@v6

    - name: 准备容器 ( init.sh )
      run: bash scripts/init.sh

    - name: 准備源碼 ( prepare.sh )
      run: d 'cd "$ffdir" && bash scripts/istoreos/prepare.sh'

    - name: 准備編譯
      run: |
        d '
          p "處理菜單"
          cd "$wrtdir/feeds/luci" && bash "$ffdir/scripts/menu.sh"
          cd "$wrtdir/package/add" && bash "$ffdir/scripts/menu.sh"

          p "展開配置"
          cd "$wrtdir"
          cp "$ffdir/scripts/istoreos/config.seed" .config
          make defconfig
        '

    - name: 壓縮編譯目錄
      run: |
        d '
          cd "$workdir"
          cp -r "$ffdir" "$wrtdir/"
          tar -cf - "$(basename "$wrtdir")/" | zstd -19 -T0 > wrt_end.tar.zst
          rm -rf "$wrtdir/$(basename "$ffdir")"
        '

    - name: 上傳編譯目錄
      uses: actions/upload-artifact@main
      with:
        name: wrt_end
        path: ${{ env.workdir_host }}/wrt_end.tar.zst
        compression-level: 0

    - name: 緩存
      uses: HiGarfield/cachewrtbuild@main
      with:
        mixkey: istoreos
        prefix: ${{ env.workdir_host }}/openwrt

    - name: 開始編譯 iStoreOS
      run: |
        d '
          cd "$wrtdir"
          p "開始下載"
          make download -j$(($(nproc) + 1))
          p "開始編譯"
          make -j$(($(nproc) + 1))
          if [ $? -ne 0 ]; then
            p "！！編譯失敗！！開啟單線程"
            make -j1 V=s
          else
            p "編譯成功"
            . set_env build_success "true"
          fi

          p "打包日誌"
          tar -cf - logs/ | zstd -19 -T0 > "$workdir/logs_istoreos.tar.zst"

          [ "$build_success" = "true" ] || exit 1
        '

        p "打印剩餘空間"
        df -h

    - name: 上傳日誌文件
      uses: actions/upload-artifact@main
      with:
        name: logs
        path: ${{ env.workdir_host }}/logs_istoreos.tar.zst
        compression-level: 0

    - if: env.build_success == 'true'
      name: 上傳固件 ( sfs )
      uses: actions/upload-artifact@main
      with:
        name: firmware
        path: ${{ env.workdir_host }}/openwrt/bin/targets/amlogic/meson/*sysupgrade.img*
        compression-level: 0

    - if: env.build_success == 'true'
      name: 上傳 packages
      uses: actions/upload-artifact@main
      with:
        name: packages
        path: ${{ env.workdir_host }}/openwrt/bin/targets/amlogic/meson/packages
        compression-level: 9

    - if: github.event_name == 'repository_dispatch' && env.build_success == 'true'
      name: 整理文件
      run: |
        p "將原始固件移動到工作目錄"
        cd ${{ env.workdir_host }}
        rm -rf ./artifact/
        mkdir -p ./artifact/
        mv openwrt/bin/targets/amlogic/meson/*sysupgrade.img* ./artifact/
        mv openwrt/bin/targets/amlogic/meson/packages ./artifact/

        d '
          p "重新打包固件"
          cd "$workdir/artifact/"
          7z a -tzip "N1-iStoreOS-24.10.5-${build_date}-sfs.zip" *n1*squashfs*
          7z a -r -tzip "N1-iStoreOS-24.10.5-${build_date}-packages.zip" packages/
        '

        p "打印剩餘空間"
        df -h

    - if: github.event_name == 'repository_dispatch' && env.build_success == 'true'
      name: 發布 release
      uses: ncipollo/release-action@main
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      with:
        tag: ${{ env.build_date }}
        allowUpdates: true
        replacesArtifacts: true
        artifacts: ${{ env.workdir_host }}/artifact/*.zip
        bodyFile: ./doc/release.md
